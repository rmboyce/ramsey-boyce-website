<p>
  A simple two-body orbit simulator that ignores planet-to-planet interactions.
  It computes orbital positions and speeds using
  <a
    href="https://en.wikipedia.org/wiki/Kepler%27s_equation"
    title="Kepler's equation Wikipedia"
    rel="nofollow"
    >Kepler's Equation</a
  >, solved numerically via Newton's method.
</p>
<p>
  Controls: click twice to define the orbit shape, then click twice more to set
  the planet's radius.
</p>
